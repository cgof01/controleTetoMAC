<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Brasão do Estado de São Paulo - Representação Vetorial -->

  <!-- Ramo de café esquerdo -->
  <g fill="#2d6e2d" transform="translate(100,120)">
    <ellipse cx="-55" cy="-30" rx="6" ry="14" transform="rotate(-40,-55,-30)"/>
    <ellipse cx="-68" cy="-10" rx="6" ry="14" transform="rotate(-55,-68,-10)"/>
    <ellipse cx="-75" cy="15" rx="6" ry="14" transform="rotate(-65,-75,15)"/>
    <ellipse cx="-72" cy="42" rx="6" ry="14" transform="rotate(-75,-72,42)"/>
    <ellipse cx="-60" cy="62" rx="5" ry="13" transform="rotate(-85,-60,62)"/>
    <ellipse cx="-44" cy="-45" rx="5" ry="12" transform="rotate(-30,-44,-45)"/>
    <ellipse cx="-30" cy="-55" rx="5" ry="11" transform="rotate(-15,-30,-55)"/>
    <!-- Folhas menores -->
    <ellipse cx="-65" cy="-22" rx="4" ry="10" transform="rotate(-50,-65,-22)"/>
    <ellipse cx="-78" cy="0" rx="4" ry="10" transform="rotate(-60,-78,0)"/>
    <ellipse cx="-82" cy="28" rx="4" ry="10" transform="rotate(-70,-82,28)"/>
  </g>
  <!-- Bagas de café esquerda -->
  <g fill="#c8a020">
    <circle cx="25" cy="72" r="4.5"/>
    <circle cx="18" cy="82" r="4.5"/>
    <circle cx="12" cy="95" r="4.5"/>
    <circle cx="20" cy="92" r="4"/>
    <circle cx="14" cy="106" r="4.5"/>
    <circle cx="22" cy="102" r="4"/>
    <circle cx="10" cy="118" r="4"/>
    <circle cx="19" cy="115" r="4"/>
    <circle cx="8" cy="130" r="4"/>
    <circle cx="17" cy="128" r="4"/>
    <circle cx="12" cy="142" r="4"/>
    <circle cx="9" cy="155" r="3.5"/>
    <circle cx="17" cy="150" r="3.5"/>
  </g>

  <!-- Ramo de café direito (espelhado) -->
  <g fill="#2d6e2d" transform="translate(100,120)">
    <ellipse cx="55" cy="-30" rx="6" ry="14" transform="rotate(40,55,-30)"/>
    <ellipse cx="68" cy="-10" rx="6" ry="14" transform="rotate(55,68,-10)"/>
    <ellipse cx="75" cy="15" rx="6" ry="14" transform="rotate(65,75,15)"/>
    <ellipse cx="72" cy="42" rx="6" ry="14" transform="rotate(75,72,42)"/>
    <ellipse cx="60" cy="62" rx="5" ry="13" transform="rotate(85,60,62)"/>
    <ellipse cx="44" cy="-45" rx="5" ry="12" transform="rotate(30,44,-45)"/>
    <ellipse cx="30" cy="-55" rx="5" ry="11" transform="rotate(15,30,-55)"/>
    <ellipse cx="65" cy="-22" rx="4" ry="10" transform="rotate(50,65,-22)"/>
    <ellipse cx="78" cy="0" rx="4" ry="10" transform="rotate(60,78,0)"/>
    <ellipse cx="82" cy="28" rx="4" ry="10" transform="rotate(70,82,28)"/>
  </g>
  <!-- Bagas de café direita -->
  <g fill="#c8a020">
    <circle cx="175" cy="72" r="4.5"/>
    <circle cx="182" cy="82" r="4.5"/>
    <circle cx="188" cy="95" r="4.5"/>
    <circle cx="180" cy="92" r="4"/>
    <circle cx="186" cy="106" r="4.5"/>
    <circle cx="178" cy="102" r="4"/>
    <circle cx="190" cy="118" r="4"/>
    <circle cx="181" cy="115" r="4"/>
    <circle cx="192" cy="130" r="4"/>
    <circle cx="183" cy="128" r="4"/>
    <circle cx="188" cy="142" r="4"/>
    <circle cx="191" cy="155" r="3.5"/>
    <circle cx="183" cy="150" r="3.5"/>
  </g>

  <!-- Escudo vermelho -->
  <path d="M55,50 L145,50 L145,160 Q100,200 55,160 Z" fill="#cc1a1a" stroke="#800000" stroke-width="2"/>
  <!-- Borda do escudo -->
  <path d="M55,50 L145,50 L145,160 Q100,200 55,160 Z" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Letra S -->
  <text x="72" y="115" font-family="Georgia,serif" font-size="62" font-weight="bold" fill="white" stroke="#333" stroke-width="2" text-anchor="middle">S</text>
  <!-- Letra P -->
  <text x="128" y="115" font-family="Georgia,serif" font-size="62" font-weight="bold" fill="white" stroke="#333" stroke-width="2" text-anchor="middle">P</text>

  <!-- Espada (entre S e P) -->
  <g transform="translate(100,70)">
    <!-- Lâmina -->
    <polygon points="0,-40 3,55 -3,55" fill="#ddd" stroke="#888" stroke-width="0.5"/>
    <!-- Guarda -->
    <rect x="-12" y="50" width="24" height="5" rx="2" fill="#aaa" stroke="#666" stroke-width="0.8"/>
    <!-- Punho -->
    <rect x="-4" y="55" width="8" height="20" rx="2" fill="#8B6914" stroke="#5a4010" stroke-width="0.8"/>
    <!-- Pomo -->
    <ellipse cx="0" cy="78" rx="6" ry="4" fill="#aaa" stroke="#666" stroke-width="0.8"/>
  </g>

  <!-- Planta decorativa (na base do escudo) -->
  <g fill="white" opacity="0.7">
    <ellipse cx="100" cy="175" rx="3" ry="8"/>
    <ellipse cx="88" cy="170" rx="3" ry="7" transform="rotate(-20,88,170)"/>
    <ellipse cx="112" cy="170" rx="3" ry="7" transform="rotate(20,112,170)"/>
    <ellipse cx="76" cy="165" rx="2.5" ry="6" transform="rotate(-35,76,165)"/>
    <ellipse cx="124" cy="165" rx="2.5" ry="6" transform="rotate(35,124,165)"/>
  </g>

  <!-- Faixa vermelha inferior com texto -->
  <path d="M25,178 Q100,210 175,178 L178,195 Q100,230 22,195 Z" fill="#cc1a1a" stroke="#800000" stroke-width="1.5"/>
  <text x="100" y="200" font-family="Georgia,serif" font-size="8.5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">PRO·BRASILIA·FIANT·EXIMIA</text>

  <!-- Estrela no topo -->
  <polygon points="100,5 104,17 117,17 107,25 111,37 100,29 89,37 93,25 83,17 96,17"
    fill="#d0d0d0" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
</svg>
