<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Controle de Teto MAC</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/brasao.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root { --ses-azul: #1e3a5f; --ses-azul-claro: #2a5298; }
    body {
      background: linear-gradient(135deg, var(--ses-azul) 0%, var(--ses-azul-claro) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      display: block;
      margin: 0 auto 1.5rem;
      max-height: 80px;
      max-width: 280px;
      object-fit: contain;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 0.2rem;
    }
    .login-subtitle {
      text-align: center;
      color: var(--ses-azul-claro);
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }
    .input-group-text {
      background: #f0f4ff;
      border-right: none;
      color: var(--ses-azul-claro);
    }
    .form-control {
      border-left: none;
      border-radius: 0 10px 10px 0 !important;
      background: #f0f4ff;
    }
    .form-control:focus {
      box-shadow: none;
      border-color: var(--ses-azul-claro);
      background: #e8f0fe;
    }
    .input-group { border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
    .input-group .input-group-text { border-radius: 10px 0 0 10px; border: 1px solid #ced4da; border-right: none; }
    .btn-login {
      background: var(--ses-azul);
      border: none;
      border-radius: 12px;
      padding: 0.75rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      width: 100%;
      color: white;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--ses-azul-claro); color: white; }
    .login-footer { text-align: center; color: #888; font-size: 0.8rem; margin-top: 1.5rem; }
    .toggle-senha { cursor: pointer; background: #f0f4ff; border: 1px solid #ced4da; border-left: none; border-radius: 0 10px 10px 0 !important; }
    .toggle-senha:hover { background: #e8f0fe; }
    .alert { border-radius: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="login-logo">
    <div class="login-title">Controle de Teto MAC</div>
    <div class="login-subtitle">CGOF — GCSS / SES-SP</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' }} py-2">
          <i class="bi bi-exclamation-triangle"></i> {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" name="email" placeholder="Email" value="{{ email|default('') }}" required autofocus>
      </div>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" name="senha" id="senhaInput" placeholder="Senha" required>
        <span class="toggle-senha input-group-text" onclick="toggleSenha()">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </span>
      </div>
      <button type="submit" class="btn btn-login">Entrar</button>
    </form>

    <div class="login-footer">Secretaria da Saúde — São Paulo</div>
  </div>

  <script>
    function toggleSenha() {
      const inp = document.getElementById('senhaInput');
      const ico = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'bi bi-eye';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
