{% extends 'base.html' %}
{% block title %}Alterar Senha{% endblock %}

{% block content %}
<div class="page-header">
  <h4 class="mb-0"><i class="bi bi-key"></i> Alterar Senha</h4>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('alterar_senha') }}">
          <div class="mb-3">
            <label class="form-label fw-bold">Senha Atual</label>
            <input type="password" class="form-control" name="senha_atual" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Nova Senha</label>
            <input type="password" class="form-control" name="nova_senha" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Confirmar Nova Senha</label>
            <input type="password" class="form-control" name="confirmar_senha" required minlength="6">
          </div>
          <button type="submit" class="btn btn-ses w-100">
            <i class="bi bi-check-circle"></i> Salvar Nova Senha
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
